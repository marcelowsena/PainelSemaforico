name: Painel Semafórico → SharePoint

on:
  # Disparo manual pelo GitHub
  workflow_dispatch:

  # Agendamento automático: todo dia às 20:00 (horário de Brasília = 23:00 UTC)
  schedule:
    - cron: '0 23 * * *'

jobs:
  gerar-e-enviar:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      SIENGE_USER: ${{ secrets.SEMAFORICO_SIENGE_USER }}
      SIENGE_PASSWORD: ${{ secrets.SEMAFORICO_SIENGE_PASSWORD }}
      PREVISION_TOKEN: ${{ secrets.SEMAFORICO_PREVISION_TOKEN }}
      SP_TENANT_ID: ${{ secrets.SEMAFORICO_SP_TENANT_ID }}
      SP_CLIENT_ID: ${{ secrets.SEMAFORICO_SP_CLIENT_ID }}
      SP_CLIENT_SECRET: ${{ secrets.SEMAFORICO_SP_CLIENT_SECRET }}
      SP_DRIVE_ID: ${{ secrets.SEMAFORICO_SP_DRIVE_ID }}
      SP_PASTA_DESTINO: ${{ secrets.SEMAFORICO_SP_PASTA_DESTINO }}

    steps:
      # 1. Checkout do repositório
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configurar Python
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Restaurar bases em cache (atualizadas pelo run anterior)
      - name: Restaurar cache de bases
        uses: actions/cache@v4
        with:
          path: |
            bases/baseContratosItens.json
            bases/baseInContratosPreco.json
            dadosPrevision.json
            dadosEvoObra.json
          key: semaforico-bases-${{ github.run_id }}
          restore-keys: |
            semaforico-bases-

      # 4. Instalar dependências Python
      - name: Instalar dependências
        run: pip install -r requirements.txt

      # 5. Gerar painel semafórico e enviar para SharePoint
      - name: Gerar painel e enviar para SharePoint
        run: python main.py

      # 6. Salvar artefatos (disponível por 7 dias no GitHub)
      - name: Salvar artefatos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semaforico-${{ github.run_id }}
          path: semaforico.csv
          retention-days: 7
          if-no-files-found: warn
